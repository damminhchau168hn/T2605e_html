<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>btvn200626</title>
    <link rel="stylesheet" href="css/layoutbtvn200626.css"/>
</head>
<body>
    <header class = "section header">
        <h2><center> Employment Separation Form</center></h2>
    </header>
    
        <section class = "section banner - slider" >
            <div class = "container">
                <form method="get" action ="#">
                    <input name="fullname" type="text" placeholder="fullname"/>
                    <input name="lastname" type ="text" placeholder="lastname"/>
            </div>
            <div class="form-group">
                <label>Employee ID</label>
                <input name ="ID" type ="text" placeholder="please ennter your employ ID" />
            </div>
             <div class="form-group">
                <label>Personal email</label>
                <input name ="email" type ="email" placeholder="please ennter your email" />
            </div>
            <div class="form-group">
                <label>last working date</label>
                <input name ="working date" type ="date" placeholder="working date" />
            </div>
            <div class="form-group">
                <label>Exit interview Schedule</label>
                <input name ="Exit inerview schedule" type ="date" placeholder="interview schedule" />
            </div>
            <div class="form-group">
                <label>Return of all company Property</label>
                <label> <input name ="property" type ="radio" value="Yes"/> Yes </label>
                <label> <input name ="property" type ="radio" value="No"/> No </label>
                <label> <input name ="property" type ="radio" value="other"/> Other </label>            
            </div>
            
          
            <div class="form-group">
                <label>comments/Feedback</label>
                <textarea name ="Comments/Feedback" row="4">
                </textarea>
            </div>
            <div class="form-group">
                <button type ="submit" value="save">submit</button>
               
            </div>
            </form>
        
</body>
</html>
